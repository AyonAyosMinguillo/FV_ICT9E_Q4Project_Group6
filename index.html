<body>

<div class="box text-center">
    <img src="AteneoLogo.png" alt="Ateneo Logo" style="width: 200px; height: 200px; margin-bottom: 20px;">
    <h3 style="color: #003a6c">Login Page</h>
<h2 class="mb-3">ATENEO DE MANILA</h2>
<h2 style="text-align: left">Username</h2>
<input type="text" id="username" class="form-control mb-2" placeholder="Enter Username...">
<h2 style="text-align: left">Password</h2>
<input type="password" id="password" class="form-control mb-2" placeholder="Enter Password...">

<div class="d-flex justify-content-between align-items-center mb-3">
<div class="form-check">
    <input class="form-check-input" type="checkbox">
    <label class="form-check-label">Stay logged in</label>
</div>
    <a href="#" onclick="forgotPassword()">Forgot password?</a>
</div>
    <button id="loginBtn" class="btn btn-custom w-50" onclick="login()" style="color:#003a6c">Login</button>
    <button id="resetBtn" class="btn btn-custom w-50 mt-2" onclick="resetAttempts()" style="display: none;">Reset Attempts</button>

    <h4 id="result"></h4>

</div>

<script>
let attempt_counter = 0;

function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let correctUser = "ROBERT_PREVOST";
    let correctPass = "BlueEagles";

    if (username === correctUser && password === correctPass) {
        document.getElementById("result").innerHTML = "Hello " + username + ", you have successfully logged in!";
        window.alert("Hello " + username + ", you have successfully logged in!");
        attempt_counter = 0;
        window.location.href = "Dashboard.html";
    } else {
        attempt_counter++;
        if (attempt_counter >= 3) {
            document.getElementById("result").innerHTML = "Access denied. Account locked after 3 attempts!";
            window.alert("Access denied. Account locked after 3 attempts!");
            document.getElementById("loginBtn").disabled = true;
            document.getElementById("resetBtn").style.display = "block";
        } else {
            document.getElementById("result").innerHTML = "Incorrect username and/or password. Attempt " + attempt_counter + " of 3";
            window.alert("The Password is incorrect. Please try again.");
        }
    }
}

function forgotPassword() {
    alert("Try Username ROBERT_PREVOST and password is BlueEagles");
}

function resetAttempts() {
    attempt_counter = 0;
    document.getElementById("loginBtn").disabled = false;
    document.getElementById("resetBtn").style.display = "none";
    document.getElementById("result").innerHTML = "";
}
</script>
